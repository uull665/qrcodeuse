<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>榮哥驚喜包</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", Arial, sans-serif;
  color: #123;
  background:
    linear-gradient(to bottom, rgba(210,235,255,.88), rgba(255,255,255,.9) 45%, rgba(94,176,230,.88)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80");
  background-size: cover;
  background-position: center;
  padding: 22px 16px;
}

.app {
  max-width: 430px;
  min-height: 100vh;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  width: 100%;
  animation: fadeIn .5s ease;
}

.title {
  font-size: 32px;
  line-height: 1.45;
  font-weight: 850;
  text-align: center;
  color: #0d3768;
  margin-bottom: 26px;
}

.card {
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 30px 22px 26px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  backdrop-filter: blur(10px);
}

.startCard {
  text-align: center;
  padding: 55px 28px 24px;
  min-height: 620px;
  display: flex;
  flex-direction: column;
}

.startGift {
  font-size: 64px;
  margin-bottom: 20px;
  animation: giftFloat 1.8s ease-in-out infinite;
}

.startText {
  line-height: 2;
  color: #5b7191;
  font-size: 18px;
  margin: 20px 0 28px;
  font-weight: 700;
}

.passwordHint {
  color: #7c8ea5;
  font-size: 15px;
  margin-bottom: 10px;
}

#passwordInput {
  display: block;
  width: 62%;
  max-width: 190px;
  margin: 0 auto;
  padding: 12px;
  border-radius: 14px;
  border: 1.5px solid #b7d2ec;
  font-size: 18px;
  text-align: center;
  letter-spacing: 5px;
  outline: none;
  transition: .2s;
}

#passwordInput:focus {
  border-color: #5a8de0;
  box-shadow: 0 0 0 4px rgba(90,141,224,.18);
}

#startScreen{
  position:relative;
  min-height:100vh;
}

.startButton {
  width: 78%;
  max-width: 240px;
  justify-content: center;
  margin: 22px auto 0;
}

.startEnterButton{
  display:block;
  margin:18px auto 0;
  padding:0;
  border:none;
  background:none;
  color:#4f86d9;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.startEnterButton:hover{
  color:#2f69c7;
}

.startEnterButton:active{
  transform:scale(.96);
}

.badge {
  display: inline-block;
  background: linear-gradient(135deg,#5a8de0,#89b7ff);
  color: white;
  font-size: 16px;
  font-weight: 700;
  padding: 8px 20px;
  border-radius: 999px;
  margin-bottom: 18px;
}

.hearts {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  color: #ff7aa2;
  margin-bottom: 22px;
  user-select: none;
}

.question {
  font-size: 23px;
  line-height: 1.55;
  font-weight: 700;
  color: #173b63;
  white-space: pre-line;
  margin-bottom: 24px;
  text-align: center;
}

.answer {
  width: 100%;
  border: 1.5px solid #b7d2ec;
  background: rgba(255,255,255,.96);
  border-radius: 20px;
  padding: 16px;
  margin: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #143a61;
  font-size: 21px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s ease;
}

.answer:hover {
  background: #eef7ff;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(34,118,207,.15);
}

.answer:active {
  transform: scale(.98);
  background: #eaf5ff;
}

.answer span {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2276cf, #68b9f4);
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 850;
  flex-shrink: 0;
}

.result {
  min-height: 30px;
  margin-top: 16px;
  font-size: 19px;
  font-weight: 800;
  color: #1675c1;
  text-align: center;
}

.final {
  display: none;
  width: 100%;
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 38px 24px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  text-align: center;
  font-size: 24px;
  line-height: 2;
  font-weight: 800;
  color: #0d2d52;
}

.modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.28);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 99;
}

.modal {
  width: 100%;
  max-width: 320px;
  background: rgba(255,255,255,.96);
  border-radius: 24px;
  padding: 28px 22px 20px;
  text-align: center;
  box-shadow: 0 18px 45px rgba(0,0,0,.22);
  animation: pop .22s ease;
}

.modalIcon {
  font-size: 34px;
  margin-bottom: 12px;
}

.modalText {
  font-size: 21px;
  line-height: 1.55;
  font-weight: 800;
  color: #143a61;
  white-space: pre-line;
  margin-bottom: 22px;
}

.modal button {
  width: 100%;
  border: none;
  border-radius: 15px;
  padding: 13px;
  background: #2276cf;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
}

.unlock {
  display: none;
  text-align: center;
  color: #0d3768;
  font-weight: 850;
}

.unlockHearts {
  font-size: 22px;
  letter-spacing: 2px;
  color: #ff7aa2;
  margin-bottom: 18px;
}

.unlockText {
  font-size: 24px;
  margin-bottom: 18px;
}

.bar {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,.55);
  border-radius: 999px;
  overflow: hidden;
}

.barInner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2276cf, #68b9f4);
  border-radius: 999px;
  transition: width 1.2s ease;
}

.fadeOut {
  animation: fadeOut .6s forwards;
}

.fadeIn {
  animation: fadeIn .6s ease;
}

.startFooterNote {
  margin-top: auto;
  padding-top: 30px;
  text-align: center;
  color: #b3bcc8;
  font-size: 11px;
  line-height: 1.5;
  opacity: .8;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: scale(.92); }
}

@keyframes pop {
  from { opacity: 0; transform: scale(.92); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes giftFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}


/* ===== 回憶 Story ===== */
.storyPage {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: #111;
  color: #fff;
  overflow: hidden;
  touch-action: manipulation;
}

.storyBackground {
  position: absolute;
  inset: -24px;
  background-size: cover;
  background-position: center;
  filter: blur(24px) brightness(.42);
  transform: scale(1.12);
  transition: background-image .45s ease;
}

.storyShade {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.34), transparent 22%),
    linear-gradient(to top, rgba(0,0,0,.48), transparent 28%);
}

.storyContent {
  position: relative;
  z-index: 2;
  width: min(100%, 430px);
  height: 100%;
  margin: 0 auto;
  padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
}

.storyProgress {
  display: grid;
  grid-template-columns: repeat(17, 1fr);
  gap: 3px;
  margin-bottom: 14px;
}

.storyProgressItem {
  height: 3px;
  border-radius: 999px;
  background: rgba(255,255,255,.3);
}

.storyProgressItem.done,
.storyProgressItem.active {
  background: rgba(255,255,255,.96);
}

.storyHeader {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  font-size: 14px;
  font-weight: 750;
  text-shadow: 0 2px 8px rgba(0,0,0,.35);
}

.storyClose {
  border: none;
  background: transparent;
  color: #fff;
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
}

.storyImageWrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.storyMedia {
  display: none;
  width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: 20px;
  box-shadow: 0 18px 45px rgba(0,0,0,.35);
}

.storyMedia.animate {
  animation: storyZoom .8s ease both;
}
  
.storyCaption {
  min-height: 48px;
  padding: 15px 8px 0;
  text-align: center;
  font-size: 15px;
  line-height: 1.6;
  font-weight: 650;
  text-shadow: 0 2px 8px rgba(0,0,0,.4);
  opacity: 0;
  transform: translateY(10px);
}

.storyCaption.show {
  animation: captionIn .5s .32s ease forwards;
}

.storyTapZone {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  z-index: 4;
}

.storyTapZone.left { left: 0; }
.storyTapZone.right { right: 0; }

.storyHint {
  position: absolute;
  left: 50%;
  bottom: max(8px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,.65);
  z-index: 3;
  pointer-events: none;
}

.birthdayPage {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 60;
  background:
    linear-gradient(to bottom, rgba(224,240,255,.95), rgba(255,255,255,.98) 50%, rgba(116,190,235,.9));
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}

.birthdayCard {
  width: min(100%, 390px);
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 44px 24px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  animation: pop .45s ease;
}

.birthdayEmoji {
  font-size: 58px;
  margin-bottom: 18px;
}

.birthdayTitle {
  font-size: 30px;
  color: #d86f8c;
  font-weight: 850;
  margin-bottom: 18px;
}

.birthdayText {
  color: #4a5f78;
  font-size: 17px;
  line-height: 1.9;
  font-weight: 650;
}

.replayButton {
  display: block;
  margin: 24px auto 0;
  padding: 0;
  border: none;
  background: none;
  color: #4f86d9;
  font-size: 16px;
  font-weight: 750;
  cursor: pointer;
}

@keyframes storyZoom {
  from {
    opacity: 0;
    transform: scale(.92);
    filter: blur(8px);
  }
  to {
    opacity: 1;
    transform: scale(1.03);
    filter: blur(0);
  }
}

@keyframes captionIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="app">

<div class="screen" id="startScreen">
  <div class="card startCard">
    <div>
      <div class="startGift">🎁</div>

      <p class="startText">
        回答幾個問題<br>
        即可解鎖你的生日驚喜 🎂
      </p>

      <div class="passwordHint">
        🔐 輸入只有你知道的密碼
      </div>

      <input
        id="passwordInput"
        type="password"
        placeholder="••••"
        onkeydown="if(event.key==='Enter') checkPassword()"
      >

      <button
        class="startEnterButton"
        onclick="checkPassword()">
        進入
      </button>
    </div>

    <div class="startFooterNote">
      ※ 只是回答問題，不可以走心喔 🤍
    </div>
  </div>
</div>

  <div class="screen" id="quizScreen" style="display:none;">
    <div class="title">🔒 解鎖挑戰</div>

    <div class="card">
      <div class="badge" id="badge"></div>
      <div class="hearts" id="hearts">♡♡♡♡♡</div>
      <div class="question" id="question"></div>
      <div id="answers"></div>
      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="unlock" id="unlockScreen">
    <div class="unlockHearts">♥♥♥♥♥</div>
    <div class="unlockText">正在驗證身份...</div>
    <div class="bar"><div class="barInner" id="barInner"></div></div>
  </div>


</div>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <div class="modalIcon" id="modalIcon">😶</div>
    <div class="modalText" id="modalText"></div>
    <button id="modalButton" onclick="closeModal()">再試一次</button>
  </div>
</div>


<div class="storyPage" id="storyPage">
  <div class="storyBackground" id="storyBackground"></div>
  <div class="storyShade"></div>

  <div class="storyContent">
    <div class="storyProgress" id="storyProgress"></div>

    <div class="storyHeader">
      <span id="storyMonth">2025 / 03</span>
      <button class="storyClose" onclick="showBirthdayFinal()" aria-label="關閉">×</button>
    </div>

<div class="storyImageWrap">
  <img
    class="storyMedia"
    id="storyImage"
    alt="每月回憶照片"
  >

  <video
    class="storyMedia"
    id="storyVideo"
    playsinline
    muted
    preload="metadata"
  ></video>
</div>

    <div class="storyCaption" id="storyCaption"></div>
  </div>

  <div class="storyTapZone left" onclick="prevStory()"></div>
  <div class="storyTapZone right" onclick="nextStory()"></div>
  <div class="storyHint">左邊上一張・右邊下一張</div>
</div>

<div class="birthdayPage" id="birthdayPage">
  <div class="birthdayCard">
    <div class="birthdayEmoji">🎂</div>
    <div class="birthdayTitle">Happy Birthday</div>
    <div class="birthdayText">
      謝謝你陪我走過這些月份。<br>
      之後也繼續一起製造更多回憶吧 🤍
    </div>
    <button class="replayButton" onclick="replayStories()">重新看一次</button>
  </div>
</div>

let current = 0;
let storyIndex = 0;
const totalQuestions = questions.length;
let wrongCounts = Array(questions.length).fill(0);
window.afterModalAction = null;
let storyTimer = null;

function checkPassword() {
  const input = document.getElementById("passwordInput").value.trim();

  if (input !== START_PASSWORD) {
    document.getElementById("modalIcon").textContent = "🔒";
    document.getElementById("modalText").textContent = "密碼錯誤\n再想想看 🤭";
    document.getElementById("modalButton").textContent = "再試一次";
    document.getElementById("modalOverlay").style.display = "flex";
    document.getElementById("passwordInput").value = "";
    return;
  }

  startQuiz();
}

function startQuiz() {
  const start = document.getElementById("startScreen");
  start.classList.add("fadeOut");

  setTimeout(() => {
    start.style.display = "none";
    const quiz = document.getElementById("quizScreen");
    quiz.style.display = "block";
    quiz.classList.add("fadeIn");
  }, 600);
}

function updateProgress() {
  let hearts = "";
  for (let i = 0; i < totalQuestions; i++) {
    hearts += i < current ? "♥" : "♡";
  }
  document.getElementById("hearts").textContent = hearts;
}

function showQuestion() {
  updateProgress();

  const q = questions[current];
  document.getElementById("badge").textContent = q.category;
  document.getElementById("question").textContent = q.question;
  document.getElementById("result").textContent = "";

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.innerHTML = `<span>${option.label}</span>${option.text}`;
    btn.onclick = () => checkAnswer(option.correct);
    answers.appendChild(btn);
  });
}

function checkAnswer(isCorrect) {
  const q = questions[current];

  if (isCorrect) {
    current++;
    updateProgress();
    document.getElementById("result").textContent = "✅ 正確! 再下一頁";

    setTimeout(() => {
      goNextQuestion();
    }, 850);

  } else if (q.passAnyway) {
    const count = wrongCounts[current];
    const index = Math.min(count, q.wrongTexts.length - 1);

    document.getElementById("modalIcon").textContent = q.icons[index];
    document.getElementById("modalText").textContent = q.wrongTexts[index];
    document.getElementById("modalButton").textContent = "老婆我錯了🥺";
    document.getElementById("modalOverlay").style.display = "flex";

    wrongCounts[current]++;

    window.afterModalAction = function () {
      document.getElementById("modalIcon").textContent = q.passModalIcon;
      document.getElementById("modalText").textContent = q.passModalText;
      document.getElementById("modalButton").textContent = "嘻嘻";
      document.getElementById("modalOverlay").style.display = "flex";

      window.afterModalAction = function () {
        current++;
        updateProgress();
        goNextQuestion();
      };
    };

  } else {
    const count = wrongCounts[current];
    const index = Math.min(count, q.wrongTexts.length - 1);

    document.getElementById("modalIcon").textContent = q.icons[index];
    document.getElementById("modalText").textContent = q.wrongTexts[index];
    document.getElementById("modalButton").textContent = "再試一次";
    document.getElementById("modalOverlay").style.display = "flex";

    wrongCounts[current]++;
  }
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";

  if (typeof window.afterModalAction === "function") {
    const action = window.afterModalAction;
    window.afterModalAction = null;
    action();
  }
}

function goNextQuestion() {
  document.getElementById("modalButton").textContent = "再試一次";

  if (current >= questions.length) {
    unlockFinal();
  } else {
    showQuestion();
  }
}

function unlockFinal() {
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("unlockScreen").style.display = "block";

  setTimeout(() => {
    document.getElementById("barInner").style.width = "100%";
  }, 100);

  setTimeout(() => {
    document.getElementById("unlockScreen").style.display = "none";
    openStories();
  }, 1800);
}

function openStories() {
  storyIndex = 0;
  document.getElementById("storyPage").style.display = "block";
  renderStory();
}


function renderStory() {
  clearStoryTimer();

  const story = stories[storyIndex];
  const image = document.getElementById("storyImage");
  const video = document.getElementById("storyVideo");
  const caption = document.getElementById("storyCaption");
  const background = document.getElementById("storyBackground");

  document.getElementById("storyMonth").textContent = story.month;

  image.style.display = "none";
  video.style.display = "none";
  image.classList.remove("animate");
  video.classList.remove("animate");
  caption.classList.remove("show");

  caption.textContent = story.caption || "";
  caption.style.display = story.caption ? "block" : "none";

  if (story.type === "video") {
    video.style.display = "block";
    video.src = story.src;
    video.currentTime = 0;
    background.style.backgroundImage = "none";
    background.style.backgroundColor = "#111";

    video.onloadeddata = () => {
      void video.offsetWidth;
      video.classList.add("animate");
      video.play().catch(() => {});
    };

    video.onerror = () => {
      video.style.display = "none";
      image.style.display = "block";
      image.src = "https://placehold.co/900x1200/eaf2fb/456789?text=" +
        encodeURIComponent(story.month);
      background.style.backgroundImage = `url("${image.src}")`;
      void image.offsetWidth;
      image.classList.add("animate");

      storyTimer = setTimeout(nextStory, 5000);
    };

    video.onended = nextStory;
  } else {
    image.style.display = "block";
    image.src = story.src;
    background.style.backgroundColor = "#111";
    background.style.backgroundImage = `url("${story.src}")`;

    image.onload = () => {
      void image.offsetWidth;
      image.classList.add("animate");
    };

    image.onerror = () => {
      image.onerror = null;
      image.src = "https://placehold.co/900x1200/eaf2fb/456789?text=" +
        encodeURIComponent(story.month);
      background.style.backgroundImage = `url("${image.src}")`;
    };

    storyTimer = setTimeout(nextStory, story.duration || 5000);
  }

  if (story.caption) {
    void caption.offsetWidth;
    caption.classList.add("show");
  }

  updateStoryProgress();
}

function updateStoryProgress() {
  const progress = document.getElementById("storyProgress");
  progress.innerHTML = "";

  stories.forEach((_, index) => {
    const item = document.createElement("div");
    item.className = "storyProgressItem";

    if (index < storyIndex) item.classList.add("done");
    if (index === storyIndex) item.classList.add("active");

    progress.appendChild(item);
  });
}


function nextStory() {
  clearStoryTimer();
  
  if (storyIndex >= stories.length - 1) {
    showBirthdayFinal();
    return;
  }

  storyIndex++;
  renderStory();
}

function prevStory() {
  clearStoryTimer();
  if (storyIndex <= 0) return;

  storyIndex--;
  renderStory();
}

function showBirthdayFinal() {
  document.getElementById("storyPage").style.display = "none";
  document.getElementById("birthdayPage").style.display = "flex";
}

function replayStories() {
  document.getElementById("birthdayPage").style.display = "none";
  openStories();
}

function clearStoryTimer() {
  if (storyTimer) {
    clearTimeout(storyTimer);
    storyTimer = null;
  }

  const video = document.getElementById("storyVideo");

  if (video) {
    video.pause();
    video.onended = null;
  }
}



showQuestion();
</script>

</body>
</html>
