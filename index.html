<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Only You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chocolate+Classical+Sans&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Zen Maru Gothic", sans-serif;
  color: #123;
  background:
    linear-gradient(to bottom, rgba(210,235,255,.88), rgba(255,255,255,.9) 45%, rgba(94,176,230,.88)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80");
  background-size: cover;
  background-position: center;
  padding: 22px 16px;
}

.app {
  max-width: 430px;
  min-height: 100vh;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  width: 100%;
  animation: fadeIn .5s ease;
}

.title {
  font-family: "Chocolate Classical Sans", serif;
  font-size: 36px;
  font-weight: 700;
  text-align: center;
  color: #0d3768;
  margin-bottom: 10px;
}  

.subtitle {
  font-size: 18px;
  line-height: 1.7;
  text-align: center;
  color: #4a6f96;
  margin-bottom: 26px;
  font-weight: 600;
}

.card {
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 28px 22px 24px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  backdrop-filter: blur(10px);
}

.badge {
  display: inline-block;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg,#4f8de8,#8bbcff);
  padding: 10px 20px;
  border-radius: 999px;
  margin-bottom: 24px;
}

.category {
  font-size: 18px;
  font-weight: 700;
  color: #4a6f96;
  margin-bottom: 10px;
}

.question {
  font-size: 30px;
  line-height: 1.7;
  font-weight: 700;
  color: #0d2d52;
  white-space: pre-line;
  margin-bottom: 28px;
}

.answer {
  width: 100%;
  border: 1.5px solid #b7d2ec;
  background: rgba(255,255,255,.96);
  border-radius: 20px;
  padding: 16px;
  margin: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #143a61;
  font-size: 21px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s ease;
}

.answer:hover{
  background:#eef7ff;
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(34,118,207,.15);
}

.answer:active {
  transform: scale(.98);
  background: #eaf5ff;
}

.answer span {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2276cf, #68b9f4);
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 850;
  flex-shrink: 0;
}

.result {
  min-height: 30px;
  margin-top: 16px;
  font-size: 19px;
  font-weight: 800;
  color: #1675c1;
  text-align: center;
}

.footer {
  margin-top: 22px;
  text-align: center;
}

.hearts {
  font-size: 20px;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.step {
  font-size: 14px;
  color: #315b85;
  font-weight: 700;
}

.final {
  display: none;
  width: 100%;
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 38px 24px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  text-align: center;
  font-size: 24px;
  line-height: 2;
  font-weight: 800;
  color: #0d2d52;
}

.modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.28);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 99;
}

.modal {
  width: 100%;
  max-width: 320px;
  background: rgba(255,255,255,.96);
  border-radius: 24px;
  padding: 28px 22px 20px;
  text-align: center;
  box-shadow: 0 18px 45px rgba(0,0,0,.22);
  animation: pop .22s ease;
}

.modalIcon {
  font-size: 34px;
  margin-bottom: 12px;
}

.modalText {
  font-size: 21px;
  line-height: 1.55;
  font-weight: 800;
  color: #143a61;
  white-space: pre-line;
  margin-bottom: 22px;
}

.modal button {
  width: 100%;
  border: none;
  border-radius: 15px;
  padding: 13px;
  background: #2276cf;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
}

.unlock {
  display: none;
  text-align: center;
  color: #0d3768;
  font-weight: 850;
}

.unlockHearts {
  font-size: 24px;
  margin-bottom: 18px;
}

.unlockText {
  font-size: 24px;
  margin-bottom: 18px;
}

.bar {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,.55);
  border-radius: 999px;
  overflow: hidden;
}

.barInner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2276cf, #68b9f4);
  border-radius: 999px;
  transition: width 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  from { opacity: 0; transform: scale(.92); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="app">

  <div class="screen" id="quizScreen">
    <div class="title">🔒 解鎖挑戰</div>
    <div class="subtitle">簡易題</div>

    <div class="card">
      <div class="badge" id="badge">第 1 題 / 共 5 題</div>
      <div class="category" id="category"></div>
      <div class="question" id="question"></div>
      <div id="answers"></div>
      <div class="result" id="result"></div>
    </div>

    <div class="footer">
      <div class="hearts" id="hearts">🤍 🤍 🤍 🤍 🤍</div>
      <div class="step" id="step">Question 1 / 5</div>
    </div>
  </div>

  <div class="unlock" id="unlockScreen">
    <div class="unlockHearts">❤️ ❤️ ❤️ ❤️ ❤️</div>
    <div class="unlockText">正在驗證身份...</div>
    <div class="bar"><div class="barInner" id="barInner"></div></div>
  </div>

  <div class="final" id="finalPage">
    Access Granted<br><br>
    這裡之後放真正的頁面內容。
  </div>

</div>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <div class="modalIcon" id="modalIcon">😶</div>
    <div class="modalText" id="modalText"></div>
    <button onclick="closeModal()">再試一次</button>
  </div>
</div>

<script>
const questions = [
  {
    question: "第一次見面在婚禮上\n老婆吃了幾顆刈包？",
    options: [
      { label: "A", text: "老婆沒吃", correct: false },
      { label: "B", text: "整顆吃完", correct: false },
      { label: "C", text: "吃了半顆", correct: true }
    ],
    wrongTexts: ["不可能不知道ㄅ!", "還要繼續嗎搞什麼！"],
    icons: ["😒", "😑"]
  },
  {
    category: "金錢觀念",
    question: "你的錢是誰的錢？",
    options: [
      { label: "A", text: "老婆的錢", correct: true },
      { label: "B", text: "我的就是我的你怎麼樣", correct: false },
      { label: "C", text: "你最好選A", correct: false }
    ],
    wrongTexts: ["不要了", "不要了\n真的不要了"],
    icons: ["😭", "🥲"]
  }
];

let current = 0;
const totalQuestions = 5;
let wrongCounts = Array(questions.length).fill(0);

function updateProgress() {
  let hearts = "";
  for (let i = 0; i < totalQuestions; i++) {
    hearts += i < current ? "❤️ " : "🤍 ";
  }
  document.getElementById("hearts").textContent = hearts.trim();
  document.getElementById("step").textContent = `Question ${Math.min(current + 1, totalQuestions)} / ${totalQuestions}`;
}

function showQuestion() {
  updateProgress();

  const q = questions[current];
  document.getElementById("step").textContent = `Question ${current + 1}`;
  document.getElementById("question").textContent = q.question;
  document.getElementById("result").textContent = "";

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.innerHTML = `<span>${option.label}</span>${option.text}`;
    btn.onclick = () => checkAnswer(option.correct);
    answers.appendChild(btn);
  });
}

function checkAnswer(isCorrect) {
  if (isCorrect) {
    current++;
    updateProgress();
    document.getElementById("result").textContent = "✅ 正確! 再下一頁";

    setTimeout(() => {
      if (current >= questions.length) {
        document.getElementById("category").textContent = "目前先到這裡";
        document.getElementById("question").textContent = "已完成 2 題。\n剩下 3 題補上後，才會進到真正頁面。";
        document.getElementById("answers").innerHTML = "";
        document.getElementById("result").textContent = "";
      } else {
        showQuestion();
      }
    }, 850);

  } else {
    const q = questions[current];
    const count = wrongCounts[current];
    const index = Math.min(count, q.wrongTexts.length - 1);

    document.getElementById("modalIcon").textContent = q.icons[index];
    document.getElementById("modalText").textContent = q.wrongTexts[index];
    document.getElementById("modalOverlay").style.display = "flex";

    wrongCounts[current]++;
  }
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

function unlockFinal() {
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("unlockScreen").style.display = "block";

  setTimeout(() => {
    document.getElementById("barInner").style.width = "100%";
  }, 100);

  setTimeout(() => {
    document.getElementById("unlockScreen").style.display = "none";
    document.getElementById("finalPage").style.display = "block";
  }, 1800);
}

showQuestion();
</script>

</body>
</html>
