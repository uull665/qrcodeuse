<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>榮哥驚喜包</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", Arial, sans-serif;
  color: #123;
  background:
    linear-gradient(to bottom, rgba(210,235,255,.88), rgba(255,255,255,.9) 45%, rgba(94,176,230,.88)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80");
  background-size: cover;
  background-position: center;
  padding: 22px 16px;
}

.app {
  max-width: 430px;
  min-height: 100vh;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  width: 100%;
  animation: fadeIn .5s ease;
}

.title {
  font-size: 32px;
  line-height: 1.45;
  font-weight: 850;
  text-align: center;
  color: #0d3768;
  margin-bottom: 26px;
}

.card {
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 30px 22px 26px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  backdrop-filter: blur(10px);
}

.startCard {
  text-align: center;
  padding: 55px 28px;
}

.startGift {
  font-size: 70px;
  margin-bottom: 20px;
  animation: giftFloat 1.8s ease-in-out infinite;
}

.startText {
  line-height: 2;
  color: #5b7191;
  font-size: 18px;
  margin: 20px 0 0;
  font-weight: 700;
}

.startButton {
  justify-content: center;
  margin-top: 35px;
}

.badge {
  display: inline-block;
  background: linear-gradient(135deg,#5a8de0,#89b7ff);
  color: white;
  font-size: 16px;
  font-weight: 700;
  padding: 8px 20px;
  border-radius: 999px;
  margin-bottom: 18px;
}

.hearts {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  color: #ff7aa2;
  margin-bottom: 22px;
  user-select: none;
}

.question {
  font-size: 23px;
  line-height: 1.55;
  font-weight: 700;
  color: #173b63;
  white-space: pre-line;
  margin-bottom: 24px;
  text-align: center;
}

.answer {
  width: 100%;
  border: 1.5px solid #b7d2ec;
  background: rgba(255,255,255,.96);
  border-radius: 20px;
  padding: 16px;
  margin: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #143a61;
  font-size: 21px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s ease;
}

.answer:hover {
  background: #eef7ff;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(34,118,207,.15);
}

.answer:active {
  transform: scale(.98);
  background: #eaf5ff;
}

.answer span {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2276cf, #68b9f4);
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 850;
  flex-shrink: 0;
}

.result {
  min-height: 30px;
  margin-top: 16px;
  font-size: 19px;
  font-weight: 800;
  color: #1675c1;
  text-align: center;
}

.final {
  display: none;
  width: 100%;
  background: rgba(255,255,255,.94);
  border-radius: 28px;
  padding: 38px 24px;
  box-shadow: 0 18px 45px rgba(27,91,145,.18);
  text-align: center;
  font-size: 24px;
  line-height: 2;
  font-weight: 800;
  color: #0d2d52;
}

.modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.28);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 99;
}

.modal {
  width: 100%;
  max-width: 320px;
  background: rgba(255,255,255,.96);
  border-radius: 24px;
  padding: 28px 22px 20px;
  text-align: center;
  box-shadow: 0 18px 45px rgba(0,0,0,.22);
  animation: pop .22s ease;
}

.modalIcon {
  font-size: 34px;
  margin-bottom: 12px;
}

.modalText {
  font-size: 21px;
  line-height: 1.55;
  font-weight: 800;
  color: #143a61;
  white-space: pre-line;
  margin-bottom: 22px;
}

.modal button {
  width: 100%;
  border: none;
  border-radius: 15px;
  padding: 13px;
  background: #2276cf;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
}

.unlock {
  display: none;
  text-align: center;
  color: #0d3768;
  font-weight: 850;
}

.unlockHearts {
  font-size: 22px;
  letter-spacing: 2px;
  color: #ff7aa2;
  margin-bottom: 18px;
}

.unlockText {
  font-size: 24px;
  margin-bottom: 18px;
}

.bar {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,.55);
  border-radius: 999px;
  overflow: hidden;
}

.barInner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2276cf, #68b9f4);
  border-radius: 999px;
  transition: width 1.2s ease;
}

.fadeOut {
  animation: fadeOut .6s forwards;
}

.fadeIn {
  animation: fadeIn .6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: scale(.92); }
}

@keyframes pop {
  from { opacity: 0; transform: scale(.92); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes giftFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<div class="app">

  <div class="screen" id="startScreen">
    <div class="card startCard">
      <div class="startGift">🎁</div>

      <p class="startText">
        回答幾個問題<br>
        即可解鎖你的生日驚喜 🎂
      </p>

      <button class="answer startButton" onclick="startQuiz()">
        💝 開始解鎖
      </button>
    </div>
  </div>

  <div class="screen" id="quizScreen" style="display:none;">
    <div class="title">🔒 解鎖挑戰</div>

    <div class="card">
      <div class="badge" id="badge"></div>
      <div class="hearts" id="hearts">♡♡♡♡♡</div>
      <div class="question" id="question"></div>
      <div id="answers"></div>
      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="unlock" id="unlockScreen">
    <div class="unlockHearts">♥♥♥♥♥</div>
    <div class="unlockText">正在驗證身份...</div>
    <div class="bar"><div class="barInner" id="barInner"></div></div>
  </div>

  <div class="final" id="finalPage">
    Access Granted<br><br>
    這裡之後放真正的頁面內容。
  </div>

</div>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <div class="modalIcon" id="modalIcon">😶</div>
    <div class="modalText" id="modalText"></div>
    <button id="modalButton" onclick="closeModal()">再試一次</button>
  </div>
</div>

<script>
const questions = [
  {
    category: "簡易題",
    question: "第一次見面是在婚禮上吧!\n那我吃了幾顆刈包？",
    options: [
      { label: "A", text: "老婆沒吃", correct: false },
      { label: "B", text: "整顆吃完", correct: false },
      { label: "C", text: "吃了半顆", correct: true }
    ],
    wrongTexts: ["不可能不知道ㄅ!", "還要繼續嗎搞什麼！", "完了完了生日禮物沒了"],
    icons: ["😒", "😑", "😒"]
  },
  {
    category: "金錢觀念",
    question: "你的錢是誰的錢？",
    options: [
      { label: "A", text: "老婆的錢", correct: true },
      { label: "B", text: "我的就是我的你怎麼樣", correct: false },
      { label: "C", text: "你最好選A", correct: false }
    ],
    wrongTexts: ["不要了", "不要了\n真的不要了"],
    icons: ["😭", "🥲"]
  },
  {
    category: "愛情ㄉ考驗",
    question: "如果我跟另一個女生\n同時發訊息給你\n你會先回誰？",
    options: [
      { label: "A", text: "當然是老婆嚕", correct: false },
      { label: "B", text: "回完她再回老婆", correct: false },
      { label: "C", text: "回完老婆再回她", correct: false }
    ],
    wrongTexts: ["那她是誰", "那她是誰!不要了\n真的不要了"],
    icons: ["😭", "🥲"],
    passAnyway: true,
    passModalText: "算了算了",
    passModalIcon: "😤"
  },
  {
    category: "送分題",
    question: "我最喜歡喝的飲料",
    options: [
      { label: "A", text: "美式咖啡", correct: false },
      { label: "B", text: "烏龍茶", correct: false },
      { label: "C", text: "珍珠奶茶", correct: true }
    ],
    wrongTexts: ["哈哈哈哈再想想"],
    icons: ["🥲"],
  }
];

let current = 0;
const totalQuestions = 5;
let wrongCounts = Array(questions.length).fill(0);
window.afterModalAction = null;

function startQuiz() {
  const start = document.getElementById("startScreen");
  start.classList.add("fadeOut");

  setTimeout(() => {
    start.style.display = "none";
    const quiz = document.getElementById("quizScreen");
    quiz.style.display = "block";
    quiz.classList.add("fadeIn");
  }, 600);
}

function updateProgress() {
  let hearts = "";
  for (let i = 0; i < totalQuestions; i++) {
    hearts += i < current ? "♥" : "♡";
  }
  document.getElementById("hearts").textContent = hearts;
}

function showQuestion() {
  updateProgress();

  const q = questions[current];
  document.getElementById("badge").textContent = q.category;
  document.getElementById("question").textContent = q.question;
  document.getElementById("result").textContent = "";

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.innerHTML = `<span>${option.label}</span>${option.text}`;
    btn.onclick = () => checkAnswer(option.correct);
    answers.appendChild(btn);
  });
}

function checkAnswer(isCorrect) {
  const q = questions[current];

  if (isCorrect) {
    current++;
    updateProgress();
    document.getElementById("result").textContent = "✅ 正確! 再下一頁";

    setTimeout(() => {
      goNextQuestion();
    }, 850);

  } else if (q.passAnyway) {
    const count = wrongCounts[current];
    const index = Math.min(count, q.wrongTexts.length - 1);

    document.getElementById("modalIcon").textContent = q.icons[index];
    document.getElementById("modalText").textContent = q.wrongTexts[index];
    document.getElementById("modalButton").textContent = "老婆我錯了🥺";
    document.getElementById("modalOverlay").style.display = "flex";

    wrongCounts[current]++;

    window.afterModalAction = function () {
      document.getElementById("modalIcon").textContent = q.passModalIcon;
      document.getElementById("modalText").textContent = q.passModalText;
      document.getElementById("modalButton").textContent = "嘿嘿";
      document.getElementById("modalOverlay").style.display = "flex";

      window.afterModalAction = function () {
        current++;
        updateProgress();
        goNextQuestion();
      };
    };

  } else {
    const count = wrongCounts[current];
    const index = Math.min(count, q.wrongTexts.length - 1);

    document.getElementById("modalIcon").textContent = q.icons[index];
    document.getElementById("modalText").textContent = q.wrongTexts[index];
    document.getElementById("modalButton").textContent = "再試一次";
    document.getElementById("modalOverlay").style.display = "flex";

    wrongCounts[current]++;
  }
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";

  if (typeof window.afterModalAction === "function") {
    const action = window.afterModalAction;
    window.afterModalAction = null;
    action();
  }
}

function goNextQuestion() {
  document.getElementById("modalButton").textContent = "再試一次";

  if (current >= questions.length) {
    document.getElementById("badge").textContent = "目前先到這裡";
    document.getElementById("question").textContent = `已完成 ${questions.length} 題。\n剩下題目補上後，才會進到真正頁面。`;
    document.getElementById("answers").innerHTML = "";
    document.getElementById("result").textContent = "";
  } else {
    showQuestion();
  }
}

function unlockFinal() {
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("unlockScreen").style.display = "block";

  setTimeout(() => {
    document.getElementById("barInner").style.width = "100%";
  }, 100);

  setTimeout(() => {
    document.getElementById("unlockScreen").style.display = "none";
    document.getElementById("finalPage").style.display = "block";
  }, 1800);
}

showQuestion();
</script>

</body>
</html>
