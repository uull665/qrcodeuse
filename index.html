<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Message</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #fff;
      font-family: "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
      line-height: 1.8;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 20px;
      border-radius: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 18px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #000;
      font-size: 18px;
      cursor: pointer;
    }

    .error {
      color: #ff6b6b;
      margin-top: 14px;
      display: none;
    }

    .message {
      display: none;
      font-size: 24px;
      line-height: 2;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="box" id="loginBox">
    <h1>ENTER PASSWORD</h1>
    <p>輸入密碼後，才能看到這段訊息。</p>

    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkPassword()">Unlock</button>

    <div class="error" id="errorText">密碼錯誤</div>
  </div>

  <div class="message" id="messageBox">
    驚不驚喜<br>
    意不意外<br><br>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById("password").value;
      const correctPassword = "0712813329";

      if (password === correctPassword) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("messageBox").style.display = "block";
      } else {
        document.getElementById("errorText").style.display = "block";
      }
    }
  </script>
</body>
</html>
